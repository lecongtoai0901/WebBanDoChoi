services:
  - type: web
    name: do-choi-backend
    runtime: dotnet
    buildCommand: dotnet publish -c Release -o /app
    startCommand: dotnet DoAn_WebBanDoChoi.dll
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dbwebbandochoi_tvta
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:80
